server:
  port: ${SERVER_PORT:9000}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/demo_clockout?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    continue-on-error: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
upload:
  local-path: ${UPLOAD_LOCAL_PATH:/tmp/uploads/}
  access-prefix: /image/

management:
  endpoints:
    web:
      exposure:
        include: health

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.demo.un
  configuration:
    map-underscore-to-camel-case: true