server:
  port: ${SERVER_PORT:9000}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa: # Mybatis/Mybatis-Plus
    hibernate:
      ddl-auto: update # 启动自动根据实体生成数据表
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
upload:
  local-path: ${UPLOAD_LOCAL_PATH:/tmp/uploads/}
  access-prefix: /image/

management:
  endpoints:
    web:
      exposure:
        include: health

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.demo.un
  configuration:
    map-underscore-to-camel-case: true