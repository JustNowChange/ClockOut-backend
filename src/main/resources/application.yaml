server:
  port: ${SERVER_PORT}

spring:
  datasource:
    url: jdbc:${MYSQL_URL}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${MYSQL_USER}
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  sql:
    init:
      continue-on-error: true
upload:
  local-path: ${UPLOAD_LOCAL_PATH}
  access-prefix: /image/

management:
  endpoints:
    web:
      exposure:
        include: health
sky:
  jwt:
    secret-key: MicroDev123456789abcdef12345678abcdxyz
    ttl: 86400000
    token-name: token


mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.demo.un
  configuration:
    map-underscore-to-camel-case: true
